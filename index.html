<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-box">
        <div class="calculator-frame">
            <div class="panel-and-btns">
                
                <div class="display-panel">
    
                </div>

                <div class="number-and-operator">
                    <div class="top-line">
                        <button>Ac</button>
                        <button>+/-</button>
                        <button>%</button>
                        <button>÷</button>
                    </div>
                    <div class="second-line">
                        <button>9</button>
                        <button>8</button>
                        <button>7</button>
                        <button>x</button>
                    </div>
                    <div class="third-line">
                        <button>6</button>
                        <button>5</button>
                        <button>4</button>
                        <button>-</button>
                    </div>
                    <div class="fourth-line">
                        <button>3</button>
                        <button>2</button>
                        <button>1</button>
                        <button>+</button>
                    </div>
                    <div class="last-line">
                        <button>0</button>
                        <button>.</button>
                        <button>=</button>
                    </div>
                </div>
            </div>
            </div>
        </div>
    <script src="index.js"></script>
</body>
</html>

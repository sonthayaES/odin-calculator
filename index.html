<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-box">
        <div class="calculator-frame">
            <div class="panel-and-btns">
                
                <div class="display-panel" placeholder="0">
                    
                </div>

                <div class="number-and-operator">
                    <div class="top-line">
                        <button class="function">Ac</button>
                        <button class="function">+/-</button>
                        <button class="function">%</button>
                        <button class="operators">÷</button>
                    </div>
                    <div class="second-line">
                        <button class="numbers">7</button>
                        <button class="numbers">8</button>
                        <button class="numbers">9</button>
                        <button class="operators">x</button>
                    </div>
                    <div class="third-line">
                        <button class="numbers">4</button>
                        <button class="numbers">5</button>
                        <button class="numbers">6</button>
                        <button class="operators">-</button>
                    </div>
                    <div class="fourth-line">
                        <button class="numbers">1</button>
                        <button class="numbers">2</button>
                        <button class="numbers">3</button>
                        <button class="operators">+</button>
                    </div>
                    <div class="last-line">
                        <button class="numbers">0</button>
                        <button class="numbers">.</button>
                        <button class="equals">=</button>
                    </div>
                </div>
            </div>
            </div>
        </div>
    <script src="index.js"></script>
</body>
</html>
